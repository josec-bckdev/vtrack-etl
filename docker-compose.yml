services:
  db:
    image: postgres:16-alpine
    container_name: vtrack_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vtrack
      POSTGRES_PASSWORD: vtrack_pass
      POSTGRES_DB: vtrack_etl
    ports:
      - "5432:5432"
    volumes:
      - vtrack_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vtrack -d vtrack_etl"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: vtrack_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://vtrack:vtrack_pass@db:5432/vtrack_etl
      DATALAKE_API_URL: ${DATALAKE_API_URL}
      NODE_ENV: production
    ports:
      - "3000:3000"
    profiles:
      - app   # only starts when explicitly requested

volumes:
  vtrack_pgdata:
