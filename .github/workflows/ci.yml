name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vtrack
          POSTGRES_PASSWORD: vtrack_pass
          POSTGRES_DB: vtrack_etl
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://vtrack:vtrack_pass@localhost:5432/vtrack_etl
      
      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://vtrack:vtrack_pass@localhost:5432/vtrack_etl

      - name: Seed database
        run: npm run prisma:seed
        env:
          DATABASE_URL: postgresql://vtrack:vtrack_pass@localhost:5432/vtrack_etl
          NODE_ENV: test

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://vtrack:vtrack_pass@localhost:5432/vtrack_etl
          DATALAKE_API_URL: https://placeholder.example.com
          NODE_ENV: test

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://vtrack:vtrack_pass@localhost:5432/vtrack_etl